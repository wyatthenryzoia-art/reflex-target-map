<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reflex target map</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<header class="site">
  <h1><a href="index.html">reflex-target-map</a></h1>
  <nav><a href="index.html" style=color:#fff>Map</a> <a href="about.html">About</a> <a href="https://github.com/wyatthenryzoia-art/reflex-target-map">GitHub</a></nav>
</header>
<div class="container">
  <p class="lead">
    <strong>84</strong> robotics companies, ranked. <strong>11</strong> have full dossiers.
    Every claim is sourced — see <a href="about.html">methodology</a>.
  </p>

  <div class="controls">
    <label>Vertical
      <select id="f-vertical"><option value="">All</option></select>
    </label>
    <label>Region
      <select id="f-region">
        <option value="">All</option>
        <option value="california">California</option>
        <option value="us_other">US (other)</option>
        <option value="international">International</option>
      </select>
    </label>
    <label>Spend
      <select id="f-spend">
        <option value="">All</option>
        <option value="a">A ($25k+/mo)</option>
        <option value="b">B ($5-25k/mo)</option>
        <option value="c">C (&lt;$5k/mo)</option>
      </select>
    </label>
    <label>Search
      <input type="search" id="f-search" placeholder="company, buyer, vertical">
    </label>
    <span class="count" id="count"></span>
  </div>

  <table>
    <thead>
      <tr>
        <th data-key="company_name">Company</th>
        <th data-key="vertical">Vertical</th>
        <th data-key="hq_display">HQ</th>
        <th data-key="score">Score</th>
        <th data-key="vla_classification">VLA</th>
        <th data-key="pain_score">Pain</th>
        <th data-key="spend_tier">Spend</th>
        <th data-key="buyer_name">Buyer</th>
        <th>Sources</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
</div>

<div class="modal-bg" id="modal-bg"><div class="modal" id="modal-content"></div></div>

<footer class="site">
  Built by Wyatt Zoia. Data as of 2026-04-28. <a href="about.html">Methodology</a>.
</footer>
<script src="assets/app.js"></script>
</body>
</html>
